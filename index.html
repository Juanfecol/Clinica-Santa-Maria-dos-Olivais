      window.sanitizeHealthPayload = function(obj, hasUserData) {
        if (!obj || typeof obj !== 'object') return obj;
        var copy = JSON.parse(JSON.stringify(obj));
        
        var healthRules = [
          { pattern: /invisalign|aparelho|ortodontia/i, replacement: 'Alinhadores e Alinhamento' },
          { pattern: /implante|implantologia|reabilitaĂ§ĂŁo/i, replacement: 'ReabilitaĂ§ĂŁo e PrĂłtese' },
          { pattern: /facetas|branqueamento|estĂ©tica|coroa|cosmĂ©tica|estĂ©tica dentĂˇria/i, replacement: 'EstĂ©tica DentĂˇria' },
          { pattern: /odontopediatria|infantil|crianĂ§as/i, replacement: 'Odontopediatria Preventiva' },
          { pattern: /endodontia|periodontia|destartarizaĂ§ĂŁo|limpeza|cĂˇrie|canal/i, replacement: 'Higiene e DiagnĂłstico' },
          { pattern: /urgĂŞncia|extraĂ§ĂŁo|cirurgia|dor/i, replacement: 'Consulta de Apoio ClĂ­nico' }
        ];

        for (var key in copy) {
          if (Object.prototype.hasOwnProperty.call(copy, key)) {
            var val = copy[key];
            if (typeof val === 'string') {
              if (hasUserData && (key === 'content_name' || key === 'content_category' || key === 'search_string')) {
                copy[key] = 'Consulta ClĂ­nica Realizada';
                continue;
              }
              for (var i = 0; i < healthRules.length; i++) {
                if (healthRules[i].pattern.test(val)) {
                  val = healthRules[i].replacement;
                  break;
                }
              }
              copy[key] = val;
            } else if (typeof val === 'object' && val !== null) {
              copy[key] = window.sanitizeHealthPayload(val, hasUserData);
            }
          }
        }
        return copy;
      };

      window.trackMeta = function(event, data, isStandard = true) {
        // Generate a unique event ID for deduplication
        const eventId = 'evt_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now();

        // Extract optional user data if present

        let hasUserData = false;
        const rawData = data ? Object.assign({}, data) : {};
        if (rawData._userData) {
          userData = rawData._userData;
          hasUserData = true;

        // Apply strict EU health sector compliance sanitization to remove specific medical diagnoses during tracking
        const cleanData = window.sanitizeHealthPayload(rawData, hasUserData);

        // Sanitize event name itself if it contains diagnostic terms

        if (hasUserData && /invisalign|implante|ortodontia|facetas|extraĂ§ĂŁo|siso/i.test(sanitizedEventName)) {
